<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mycelium — Internet of Cognition</title>
<meta property="og:title" content="mycelium">
<meta property="og:description" content="Coordination layer for multi-agent systems. Semantic negotiation, persistent memory, collective intelligence.">
<meta property="og:image" content="https://mycelium-io.github.io/og.png">
<meta property="og:url" content="https://mycelium-io.github.io">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://mycelium-io.github.io/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05090f;
    --accent: #38bdf8;
    --text: #e2eaf6;
    --muted: #4a6080;
    --border: #162035;
    --card: #0c1524;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  #mycelium-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    width: 100%;
    height: 100%;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  .wrap {
    max-width: 760px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  /* Soft mask over the canvas — darkens center so content reads clearly,
     animation stays visible at the edges. No card, no border, no glass. */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(
      ellipse 60% 70% at 50% 45%,
      rgba(5, 9, 15, 0.88) 0%,
      rgba(5, 9, 15, 0.5) 60%,
      transparent 100%
    );
  }

  .logo {
    width: 96px;
    height: 96px;
    object-fit: contain;
    margin-bottom: 32px;
  }

  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'SF Mono', 'Fira Mono', monospace;
    font-weight: 600;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(36px, 7vw, 58px);
    font-weight: 600;
    font-style: italic;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    /* Serif/sans mix: brand name in serif, tagline in sans */
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  .tagline {
    font-size: clamp(15px, 2.5vw, 18px);
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 48px;
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
  }

  .install-block {
    background: rgba(12, 21, 36, 0.55);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    text-align: left;
  }
  .install-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'SF Mono', monospace;
    margin-bottom: 14px;
  }
  .install-cmd {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .install-cmd code {
    font-family: 'SF Mono', 'Fira Mono', 'Menlo', monospace;
    font-size: 15px;
    color: var(--accent);
    flex: 1;
    word-break: break-all;
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'SF Mono', monospace;
    padding: 6px 0;
    width: 68px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: #34d399; color: #34d399; }

  .links {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 40px;
    flex-wrap: wrap;
  }
  .links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    font-family: 'SF Mono', monospace;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }
  .links a:hover { color: var(--accent); }

  @media (max-width: 480px) {
    .install-cmd code { font-size: 11px; }
  }
</style>
</head>
<body>
<canvas id="mycelium-bg"></canvas>
<div class="wrap">
  <img src="logo.png" alt="Mycelium" class="logo">
  <div class="eyebrow">Internet of Cognition</div>
  <h1>mycelium</h1>
  <p class="tagline">Coordination layer for multi-agent systems.<br>Semantic negotiation, persistent memory, collective intelligence.</p>

  <div class="install-block">
    <div class="install-label">Install</div>
    <div class="install-cmd">
      <code id="install-cmd">curl -fsSL https://mycelium-io.github.io/mycelium/install.sh | bash</code>
      <button class="copy-btn" onclick="copyInstall()">copy</button>
    </div>
  </div>

  <div class="links">
    <a href="https://github.com/mycelium-io/mycelium">GitHub</a>
    <a href="https://mycelium-io.github.io/mycelium/">Docs</a>
    <a href="https://github.com/mycelium-io/mycelium/releases">Releases</a>
  </div>

</div>

<script>
function copyInstall() {
  const cmd = document.getElementById('install-cmd').textContent;
  navigator.clipboard.writeText(cmd).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
<script>
(function() {
  const canvas = document.getElementById('mycelium-bg');
  const ctx = canvas.getContext('2d');

  // ── Pixelated grid ──
  const CELL = 8;
  const cols = 480, rows = 270;
  // Two layers: structure (permanent network) and flow (nutrient transport)
  var structure = new Float32Array(cols * rows);  // permanent hypha map
  var trail = new Float32Array(cols * rows);       // animated nutrient flow
  var colorIdx = new Uint8Array(cols * rows);

  const BG = { r: 5, g: 9, b: 15 };
  const COLORS = [
    { r: 56, g: 189, b: 248 },   // cyan
    { r: 129, g: 140, b: 248 },   // indigo
    { r: 192, g: 132, b: 252 },   // purple
  ];

  canvas.style.width = '100%';
  canvas.style.height = '100%';
  canvas.style.imageRendering = 'pixelated';

  var viewCols, viewRows;
  function resize() {
    viewCols = Math.min(Math.ceil(window.innerWidth / CELL), cols);
    viewRows = Math.min(Math.ceil(window.innerHeight / CELL), rows);
    canvas.width = viewCols;
    canvas.height = viewRows;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── LAYER 1: Tip-growth (Meškauskas et al.) — builds the network ──

  const TIP_SPEED = 0.25;
  const BRANCH_PROB = 0.015;
  const BRANCH_ANGLE_MIN = 0.4;
  const BRANCH_ANGLE_MAX = 1.1;
  const WANDER = 0.1;
  const MAX_TIPS = 1200;

  var tips = [];

  function depositStructure(x, y, ci, gen) {
    var gx = Math.floor(x), gy = Math.floor(y);
    var strength = 0.5 / (1 + gen * 0.25);
    var radius = gen < 2 ? 1 : 0;
    for (var dy = -radius; dy <= radius; dy++) {
      for (var dx = -radius; dx <= radius; dx++) {
        var px = gx + dx, py = gy + dy;
        if (px >= 0 && px < cols && py >= 0 && py < rows) {
          var idx = py * cols + px;
          var str = (dx === 0 && dy === 0) ? strength : strength * 0.4;
          structure[idx] = Math.min(1.0, structure[idx] + str);
          colorIdx[idx] = ci;
        }
      }
    }
  }

  function isOccupied(x, y) {
    var gx = Math.floor(x), gy = Math.floor(y);
    if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) return true;
    return structure[gy * cols + gx] > 0.2;
  }

  function seedColony(cx, cy, ci, n) {
    for (var i = 0; i < n; i++) {
      var angle = (Math.PI * 2 * i) / n + (Math.random() - 0.5) * 0.5;
      tips.push({
        x: cx + Math.cos(angle) * 2,
        y: cy + Math.sin(angle) * 2,
        angle: angle, ci: ci, age: 0, gen: 0,
        maxAge: 1500 + Math.floor(Math.random() * 3000),
        speed: TIP_SPEED * (0.7 + Math.random() * 0.6),
      });
    }
    depositStructure(cx, cy, ci, 0);
  }

  function growStep() {
    var newTips = [];
    for (var i = tips.length - 1; i >= 0; i--) {
      var t = tips[i];
      t.age++;
      t.angle += (Math.random() - 0.5) * WANDER * 2;
      var nx = t.x + Math.cos(t.angle) * t.speed;
      var ny = t.y + Math.sin(t.angle) * t.speed;
      if (nx < 0 || nx >= cols || ny < 0 || ny >= rows || t.age > t.maxAge) {
        tips.splice(i, 1); continue;
      }
      if (t.age > 50 && isOccupied(nx, ny)) {
        depositStructure(nx, ny, t.ci, t.gen); tips.splice(i, 1); continue;
      }
      depositStructure(t.x, t.y, t.ci, t.gen);
      t.x = nx; t.y = ny;
      if (t.age > 300 && t.age % 150 === 0 && Math.random() < 0.12) {
        seedColony(t.x, t.y, t.ci, 2);
      }
      if (tips.length + newTips.length < MAX_TIPS && Math.random() < BRANCH_PROB && t.age > 10) {
        var bAngle = BRANCH_ANGLE_MIN + Math.random() * (BRANCH_ANGLE_MAX - BRANCH_ANGLE_MIN);
        var sign = Math.random() < 0.5 ? -1 : 1;
        newTips.push({
          x: t.x, y: t.y, angle: t.angle + sign * bAngle,
          ci: t.ci, age: 0, gen: t.gen + 1,
          maxAge: 600 + Math.floor(Math.random() * 1500),
          speed: t.speed * (0.75 + Math.random() * 0.25),
        });
      }
    }
    for (var j = 0; j < newTips.length; j++) {
      if (tips.length < MAX_TIPS) tips.push(newTips[j]);
    }
  }

  // ── LAYER 2: Nutrient agents (Physarum-style) — flow through network ──

  var agents = [];
  const MAX_AGENTS = 600;
  const SENSOR_DIST = 6;
  const SENSOR_ANGLE = 0.6;

  function spawnAgentOnNetwork() {
    for (var attempt = 0; attempt < 20; attempt++) {
      var x = Math.random() * viewCols;
      var y = Math.random() * viewRows;
      var gx = Math.floor(x), gy = Math.floor(y);
      if (gx >= 0 && gx < cols && gy >= 0 && gy < rows && structure[gy * cols + gx] > 0.1) {
        agents.push({ x: x, y: y, angle: Math.random() * Math.PI * 2, ci: colorIdx[gy * cols + gx], speed: 0.08 + Math.random() * 0.1 });
        return;
      }
    }
  }

  function senseTrail(ax, ay, angle, offset) {
    var sx = Math.floor(ax + Math.cos(angle + offset) * SENSOR_DIST);
    var sy = Math.floor(ay + Math.sin(angle + offset) * SENSOR_DIST);
    if (sx < 0 || sx >= cols || sy < 0 || sy >= rows) return 0;
    return structure[sy * cols + sx] * 0.5 + trail[sy * cols + sx];
  }

  // ── PRE-WARM ──
  var numColonies = 15 + Math.floor(Math.random() * 8);
  for (var c = 0; c < numColonies; c++) {
    seedColony(15 + Math.random() * (viewCols - 30), 15 + Math.random() * (viewRows - 30), Math.floor(Math.random() * COLORS.length), 2 + Math.floor(Math.random() * 3));
  }
  for (var warm = 0; warm < 4000; warm++) { growStep(); }
  for (var a = 0; a < MAX_AGENTS; a++) { spawnAgentOnNetwork(); }
  for (var warm = 0; warm < 200; warm++) {
    for (var i = 0; i < trail.length; i++) { trail[i] *= 0.995; }
    for (var i = 0; i < agents.length; i++) {
      var a = agents[i];
      var sL = senseTrail(a.x, a.y, a.angle, -SENSOR_ANGLE);
      var sC = senseTrail(a.x, a.y, a.angle, 0);
      var sR = senseTrail(a.x, a.y, a.angle, SENSOR_ANGLE);
      var turn = 0.08 + Math.random() * 0.06;
      if (sC >= sL && sC >= sR) a.angle += (Math.random() - 0.5) * 0.3;
      else if (sL > sR) a.angle -= turn;
      else a.angle += turn;
      a.x += Math.cos(a.angle) * a.speed; a.y += Math.sin(a.angle) * a.speed;
      if (a.x < 0) a.x += cols; if (a.x >= cols) a.x -= cols;
      if (a.y < 0) a.y += rows; if (a.y >= rows) a.y -= rows;
      var gx = Math.floor(a.x), gy = Math.floor(a.y);
      if (gx >= 0 && gx < cols && gy >= 0 && gy < rows) { trail[gy * cols + gx] = Math.min(1.0, trail[gy * cols + gx] + 0.04); }
    }
  }

  // ── ANIMATION LOOP ──
  var lastFrame = 0;
  var frameInterval = 1000 / 20;

  function animate(timestamp) {
    requestAnimationFrame(animate);
    if (timestamp - lastFrame < frameInterval) return;
    lastFrame = timestamp;
    growStep();
    if (tips.length < 5) {
      seedColony(10 + Math.random() * (viewCols - 20), 10 + Math.random() * (viewRows - 20), Math.floor(Math.random() * COLORS.length), 2 + Math.floor(Math.random() * 2));
    }
    for (var i = 0; i < trail.length; i++) { trail[i] *= 0.99; if (trail[i] < 0.005) trail[i] = 0; }
    for (var i = 0; i < agents.length; i++) {
      var a = agents[i];
      var sL = senseTrail(a.x, a.y, a.angle, -SENSOR_ANGLE);
      var sC = senseTrail(a.x, a.y, a.angle, 0);
      var sR = senseTrail(a.x, a.y, a.angle, SENSOR_ANGLE);
      var turn = 0.08 + Math.random() * 0.06;
      if (sC >= sL && sC >= sR) { a.angle += (Math.random() - 0.5) * 0.3; }
      else if (sL > sR) { a.angle -= turn; }
      else { a.angle += turn; }
      a.x += Math.cos(a.angle) * a.speed; a.y += Math.sin(a.angle) * a.speed;
      if (a.x < 0) a.x += cols; if (a.x >= cols) a.x -= cols;
      if (a.y < 0) a.y += rows; if (a.y >= rows) a.y -= rows;
      var gx = Math.floor(a.x), gy = Math.floor(a.y);
      if (gx >= 0 && gx < cols && gy >= 0 && gy < rows && structure[gy * cols + gx] < 0.05) {
        for (var att = 0; att < 30; att++) {
          var rx = Math.floor(Math.random() * viewCols), ry = Math.floor(Math.random() * viewRows);
          if (structure[ry * cols + rx] > 0.1) { a.x = rx; a.y = ry; a.angle = Math.random() * Math.PI * 2; a.ci = colorIdx[ry * cols + rx]; gx = rx; gy = ry; break; }
        }
      }
      if (gx >= 0 && gx < cols && gy >= 0 && gy < rows) {
        var idx = gy * cols + gx;
        trail[idx] = Math.min(1.0, trail[idx] + 0.04);
        colorIdx[idx] = a.ci;
      }
    }
    ctx.fillStyle = 'rgb(' + BG.r + ',' + BG.g + ',' + BG.b + ')';
    ctx.fillRect(0, 0, viewCols, viewRows);
    var rw = Math.min(viewCols, cols), rh = Math.min(viewRows, rows);
    for (var y = 0; y < rh; y++) {
      for (var x = 0; x < rw; x++) {
        var idx = y * cols + x;
        var sVal = structure[idx], tVal = trail[idx];
        if (sVal < 0.01 && tVal < 0.01) continue;
        var c = COLORS[colorIdx[idx]];
        var alpha = sVal * 0.02 + tVal * 0.2;
        ctx.fillStyle = 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + alpha + ')';
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
