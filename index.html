<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mycelium — Internet of Cognition</title>
<meta property="og:title" content="mycelium">
<meta property="og:description" content="Coordination layer for multi-agent systems. Semantic negotiation, persistent memory, collective intelligence.">
<meta property="og:image" content="https://mycelium-io.github.io/og.png">
<meta property="og:url" content="https://mycelium-io.github.io">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://mycelium-io.github.io/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05090f;
    --accent: #38bdf8;
    --text: #e2eaf6;
    --muted: #4a6080;
    --border: #162035;
    --card: #0c1524;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  #mycelium-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    width: 100%;
    height: 100%;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  .wrap {
    max-width: 760px;
    width: 100%;
    text-align: center;
  }

  .logo {
    width: 96px;
    height: 96px;
    object-fit: contain;
    margin-bottom: 32px;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'SF Mono', 'Fira Mono', monospace;
    font-weight: 600;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(36px, 7vw, 58px);
    font-weight: 600;
    font-style: italic;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    /* Serif/sans mix: brand name in serif, tagline in sans */
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  .tagline {
    font-size: clamp(15px, 2.5vw, 18px);
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 48px;
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
  }

  .install-block {
    background: rgba(12, 21, 36, 0.55);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    text-align: left;
  }
  .install-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'SF Mono', monospace;
    margin-bottom: 14px;
  }
  .install-cmd {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .install-cmd code {
    font-family: 'SF Mono', 'Fira Mono', 'Menlo', monospace;
    font-size: 15px;
    color: var(--accent);
    flex: 1;
    word-break: break-all;
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'SF Mono', monospace;
    padding: 6px 0;
    width: 68px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: #34d399; color: #34d399; }

  .links {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 40px;
    flex-wrap: wrap;
  }
  .links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-family: 'SF Mono', monospace;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }
  .links a:hover { color: var(--accent); }

  .footer {
    margin-top: 64px;
    font-size: 11px;
    color: var(--border);
    font-family: 'SF Mono', monospace;
    letter-spacing: 0.08em;
  }

  @media (max-width: 480px) {
    .install-cmd code { font-size: 11px; }
  }
</style>
</head>
<body>
<canvas id="mycelium-bg"></canvas>
<div class="wrap">
  <img src="logo.png" alt="Mycelium" class="logo">
  <div class="eyebrow">Internet of Cognition</div>
  <h1>mycelium</h1>
  <p class="tagline">Coordination layer for multi-agent systems.<br>Semantic negotiation, persistent memory, collective intelligence.</p>

  <div class="install-block">
    <div class="install-label">Install</div>
    <div class="install-cmd">
      <code id="install-cmd">curl -fsSL https://mycelium-io.github.io/mycelium/install.sh | bash</code>
      <button class="copy-btn" onclick="copyInstall()">copy</button>
    </div>
  </div>

  <div class="links">
    <a href="https://github.com/mycelium-io/mycelium">GitHub</a>
    <a href="https://mycelium-io.github.io/mycelium/">Docs</a>
    <a href="https://github.com/mycelium-io/mycelium/releases">Releases</a>
  </div>

  <div class="footer">mycelium-io · MIT</div>
</div>

<script>
function copyInstall() {
  const cmd = document.getElementById('install-cmd').textContent;
  navigator.clipboard.writeText(cmd).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
<script>
(function() {
  const canvas = document.getElementById('mycelium-bg');
  const ctx = canvas.getContext('2d');

  const CELL = 8;
  const cols = 480, rows = 270;
  var trail = new Float32Array(cols * rows);
  var colorIdx = new Uint8Array(cols * rows);

  const BG = { r: 5, g: 9, b: 15 };
  const COLORS = [
    { r: 56, g: 189, b: 248 },
    { r: 129, g: 140, b: 248 },
    { r: 192, g: 132, b: 252 },
  ];

  canvas.style.width = '100%';
  canvas.style.height = '100%';
  canvas.style.imageRendering = 'pixelated';

  var viewCols, viewRows;
  function resize() {
    viewCols = Math.min(Math.ceil(window.innerWidth / CELL), cols);
    viewRows = Math.min(Math.ceil(window.innerHeight / CELL), rows);
    canvas.width = viewCols;
    canvas.height = viewRows;
  }
  window.addEventListener('resize', resize);
  resize();

  const agents = [];
  const MAX_AGENTS = 5000;

  function Agent(x, y, angle, ci) {
    this.x = x; this.y = y; this.angle = angle; this.ci = ci;
    this.age = 0;
    this.speed = 0.08 + Math.random() * 0.12;
  }

  function spawnAgent() {
    var x, y;
    if (Math.random() < 0.3) {
      var side = Math.floor(Math.random() * 4);
      if (side === 0) { x = Math.random() * cols; y = 0; }
      else if (side === 1) { x = Math.random() * cols; y = rows - 1; }
      else if (side === 2) { x = 0; y = Math.random() * rows; }
      else { x = cols - 1; y = Math.random() * rows; }
    } else { x = Math.random() * cols; y = Math.random() * rows; }
    agents.push(new Agent(x, y, Math.random() * Math.PI * 2, Math.floor(Math.random() * COLORS.length)));
  }

  var numClusters = 120;
  for (var c = 0; c < numClusters; c++) {
    var cx = Math.random() * cols, cy = Math.random() * rows;
    var ci = Math.floor(Math.random() * COLORS.length);
    var clusterSize = 30 + Math.floor(Math.random() * 20);
    for (var j = 0; j < clusterSize; j++) {
      var ax = cx + (Math.random() - 0.5) * 30;
      var ay = cy + (Math.random() - 0.5) * 30;
      if (ax < 0) ax += cols; if (ax >= cols) ax -= cols;
      if (ay < 0) ay += rows; if (ay >= rows) ay -= rows;
      agents.push(new Agent(ax, ay, Math.random() * Math.PI * 2, ci));
    }
  }

  var SENSOR_DIST = 16, SENSOR_ANGLE = 1.2;
  function sense(agent, angleOffset) {
    var sx = Math.floor(agent.x + Math.cos(agent.angle + angleOffset) * SENSOR_DIST);
    var sy = Math.floor(agent.y + Math.sin(agent.angle + angleOffset) * SENSOR_DIST);
    if (sx < 0 || sx >= cols || sy < 0 || sy >= rows) return 0;
    return trail[sy * cols + sx];
  }

  var lastFrame = 0, frameInterval = 1000 / 20, frameCount = 0;

  function animate(timestamp) {
    requestAnimationFrame(animate);
    if (timestamp - lastFrame < frameInterval) return;
    lastFrame = timestamp; frameCount++;

    for (var i = 0; i < trail.length; i++) {
      trail[i] *= 0.997;
      if (trail[i] < 0.005) trail[i] = 0;
    }

    for (var i = 0; i < agents.length; i++) {
      var a = agents[i];
      var sL = sense(a, -SENSOR_ANGLE), sC = sense(a, 0), sR = sense(a, SENSOR_ANGLE);
      var turnSpeed = 0.08 + Math.random() * 0.06;
      if (sC >= sL && sC >= sR) { a.angle += (Math.random() - 0.5) * 0.3; }
      else if (sL > sR) { a.angle -= turnSpeed; }
      else if (sR > sL) { a.angle += turnSpeed; }
      else { a.angle += (Math.random() < 0.5 ? -1 : 1) * turnSpeed; }
      a.angle += Math.sin(frameCount * 0.002 + a.x * 0.03 + a.y * 0.04) * 0.02;
      a.x += Math.cos(a.angle) * a.speed;
      a.y += Math.sin(a.angle) * a.speed;
      if (a.x < 0) a.x += cols; if (a.x >= cols) a.x -= cols;
      if (a.y < 0) a.y += rows; if (a.y >= rows) a.y -= rows;
      var gx = Math.floor(a.x), gy = Math.floor(a.y);
      for (var dy = -1; dy <= 1; dy++) {
        for (var dx = -1; dx <= 1; dx++) {
          var px = gx + dx, py = gy + dy;
          if (px >= 0 && px < cols && py >= 0 && py < rows) {
            var pidx = py * cols + px;
            trail[pidx] = Math.min(1.0, trail[pidx] + ((dx === 0 && dy === 0) ? 0.06 : 0.02));
            colorIdx[pidx] = a.ci;
          }
        }
      }
    }

    if (frameCount % 3 === 0) {
      var lw = Math.min(viewCols, cols), lh = Math.min(viewRows, rows);
      for (var y = 1; y < lh - 1; y++) {
        for (var x = 1; x < lw - 1; x++) {
          var idx = y * cols + x, val = trail[idx], neighbors = 0;
          for (var dy = -1; dy <= 1; dy++) {
            for (var dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              if (trail[(y + dy) * cols + (x + dx)] > 0.05) neighbors++;
            }
          }
          if (val < 0.05) {
            if (neighbors === 3 && Math.random() < 0.04) {
              for (var dy2 = -1; dy2 <= 1; dy2++) {
                for (var dx2 = -1; dx2 <= 1; dx2++) {
                  var ni = (y + dy2) * cols + (x + dx2);
                  if (trail[ni] > 0.05) { colorIdx[idx] = colorIdx[ni]; dy2 = 2; break; }
                }
              }
              trail[idx] = 0.25 + Math.random() * 0.1;
            }
          } else {
            if (neighbors > 5) trail[idx] *= 0.9;
            else if (neighbors < 1) trail[idx] *= 0.95;
          }
        }
      }
    }

    ctx.fillStyle = 'rgb(' + BG.r + ',' + BG.g + ',' + BG.b + ')';
    ctx.fillRect(0, 0, viewCols, viewRows);
    var renderW = Math.min(viewCols, cols), renderH = Math.min(viewRows, rows);
    for (var y = 0; y < renderH; y++) {
      for (var x = 0; x < renderW; x++) {
        var val = trail[y * cols + x];
        if (val < 0.01) continue;
        var cc = COLORS[colorIdx[y * cols + x]];
        var alpha = val * 0.1;
        ctx.fillStyle = 'rgba(' + cc.r + ',' + cc.g + ',' + cc.b + ',' + alpha + ')';
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
