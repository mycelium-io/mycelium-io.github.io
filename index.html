<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycelium — Internet of Cognition</title>
<style>
  :root {
    --bg: #05090f;
    --accent: #38bdf8;
    --text: #e2eaf6;
    --muted: #4a6080;
    --border: #162035;
    --card: #0c1524;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 70% 10%, rgba(192,132,252,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 15% 80%, rgba(56,189,248,0.05) 0%, transparent 50%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  .wrap {
    max-width: 760px;
    width: 100%;
    text-align: center;
  }

  .logo {
    width: 96px;
    height: 96px;
    object-fit: contain;
    margin-bottom: 32px;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'SF Mono', 'Fira Mono', monospace;
    font-weight: 600;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(36px, 7vw, 58px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    /* Serif/sans mix: brand name in serif, tagline in sans */
    font-family: Georgia, 'Times New Roman', serif;
  }

  .tagline {
    font-size: clamp(15px, 2.5vw, 18px);
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 48px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 400;
  }

  .install-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    text-align: left;
  }
  .install-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'SF Mono', monospace;
    margin-bottom: 14px;
  }
  .install-cmd {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .install-cmd code {
    font-family: 'SF Mono', 'Fira Mono', 'Menlo', monospace;
    font-size: 15px;
    color: var(--accent);
    flex: 1;
    word-break: break-all;
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'SF Mono', monospace;
    padding: 6px 0;
    width: 68px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: #34d399; color: #34d399; }

  .links {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 40px;
    flex-wrap: wrap;
  }
  .links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-family: 'SF Mono', monospace;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }
  .links a:hover { color: var(--accent); }

  .footer {
    margin-top: 64px;
    font-size: 11px;
    color: var(--border);
    font-family: 'SF Mono', monospace;
    letter-spacing: 0.08em;
  }

  @media (max-width: 480px) {
    .install-cmd code { font-size: 11px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <img src="logo.png" alt="Mycelium" class="logo">
  <div class="eyebrow">Internet of Cognition</div>
  <h1>mycelium</h1>
  <p class="tagline">Coordination layer for multi-agent systems.<br>Semantic negotiation, persistent memory, collective intelligence.</p>

  <div class="install-block">
    <div class="install-label">Install</div>
    <div class="install-cmd">
      <code id="install-cmd">curl -fsSL https://mycelium-io.github.io/mycelium/install.sh | bash</code>
      <button class="copy-btn" onclick="copyInstall()">copy</button>
    </div>
  </div>

  <div class="links">
    <a href="https://github.com/mycelium-io/mycelium">GitHub</a>
    <a href="https://mycelium-io.github.io/mycelium/">Docs</a>
    <a href="https://github.com/mycelium-io/mycelium/releases">Releases</a>
  </div>

  <div class="footer">mycelium-io · MIT</div>
</div>

<script>
function copyInstall() {
  const cmd = document.getElementById('install-cmd').textContent;
  navigator.clipboard.writeText(cmd).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
